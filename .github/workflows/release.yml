name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Windows installer
        run: npm run dist:win -- --publish never

      - name: Build Windows portable executable
        run: npm run dist:portable -- --publish never

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: FilePeek AI ${{ github.ref_name }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            dist/FilePeek AI Setup 1.0.0.exe
            dist/FilePeek AI Setup 1.0.0.exe.blockmap
            dist/FilePeek AI 1.0.0.exe
            dist/latest.yml
